spring.application.name=campus-service
server.port=8083

# Database Configuration
# Default to H2 for local dev without Docker, but allow override for Postgres in Docker
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:campusdb}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=true

# Hibernate ddl auto (update for persistence, create-drop only if needed)
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# JWT Secret
jwt.secret=${JWT_SECRET:campus-buddy-super-secret-key-change-this-in-production-with-minimum-256-bits-for-security}
